<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- PWA 최적화: 전체화면, 확대 방지 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SNGTA PRO 스캐너</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; user-select: none; }
        
        /* 카메라 영역: 1.5배 디지털 줌 효과로 멀리 있는 QR 조준 최적화 */
        #video-container { position: relative; width: 100%; height: 75vh; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #qr-video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.5); transform-origin: center; }
        
        /* 하단 상태 알림창 */
        #result-card { flex: 1; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; font-weight: bold; text-align: center; transition: background-color 0.1s; white-space: pre-wrap; line-height: 1.4; z-index: 10; }
        
        .ready { background: #333; }
        .sending { background: #10b981; }
        .success { background: #000; }
        .error { background: #dc2626; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="qr-video" playsinline autoplay muted></video>
    </div>
    
    <div id="result-card" class="ready">카메라 켜는 중...</div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrmz0rU5gl8IPZ9ZWd57NtyI7Q9mjEeFbHaJ8pX-waba83n5BJ0kGaWZCx7D330teZYw/exec";
        
        const video = document.getElementById('qr-video');
        const resultCard = document.getElementById('result-card');
        
        let isProcessing = false;
        let lastScanned = "";
        let uiResetTimer = null;

        // 🚀 스캔 데이터 처리 로직
        async function handleDetection(text) {
            // QR이 인식될 때마다 UI 초기화 타이머를 갱신 (카메라를 치우면 1.5초 뒤 ready 상태로 복귀)
            clearTimeout(uiResetTimer);
            uiResetTimer = setTimeout(() => {
                if (!isProcessing) {
                    resultCard.className = "ready";
                    resultCard.innerText = "QR 코드를 비춰주세요";
                }
            }, 1500);

            // 현재 전송 중이면 무시
            if (isProcessing) return;

            // [수정됨] 중복 스캔 시: 대고 있는 동안 계속해서 에러창 유지
            if (text === lastScanned) {
                resultCard.className = "error";
                resultCard.innerText = "⚠️ 중복 스캔!\n방금 전송한 제품입니다.";
                return; 
            }

            // 새로운 QR코드 전송 시작
            isProcessing = true;
            lastScanned = text;
            
            resultCard.className = "sending";
            resultCard.innerText = "⏳ 전송 중...\n" + text;

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL + "?text=" + encodeURIComponent(text));
                if (response.ok) {
                    resultCard.className = "success";
                    resultCard.innerText = "✅ 저장 완료!";
                } else {
                    throw new Error("서버 오류");
                }
            } catch (err) {
                resultCard.className = "error";
                resultCard.innerText = "❌ 전송 실패 (재시도 요망)";
                lastScanned = ""; // 에러 시 다시 찍을 수 있게 초기화
            } finally {
                // 0.8초 쿨타임 후 다음 스캔 허용
                setTimeout(() => { isProcessing = false; }, 800);
            }
        }

        // 🧠 네이티브 하드웨어 스캐너 가동
        async function startScanner() {
            if (!('BarcodeDetector' in window)) {
                resultCard.className = "error";
                resultCard.innerText = "기기 설정에서\nShape Detection API를 켜주세요.";
                return;
            }

            const barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });

            try {
                // 작고 멀리 있는 QR을 잡기 위해 FHD(1080p) 이상의 고해상도 스트림 강제 요청
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1920 }, 
                        height: { ideal: 1080 },
                        advanced: [{ focusMode: "continuous" }] // 자동 초점 최적화
                    }
                });
                video.srcObject = stream;

                // 비디오 프레임이 들어올 때마다 검사 (requestVideoFrameCallback 사용)
                const scanFrame = async () => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        try {
                            const barcodes = await barcodeDetector.detect(video);
                            if (barcodes.length > 0) {
                                handleDetection(barcodes[0].rawValue);
                            }
                        } catch (e) {
                            // 프레임 분석 오류 무시
                        }
                    }
                    // 다음 비디오 프레임이 렌즈에 들어오면 다시 호출 (발열 최소화, 효율 극대화)
                    if ('requestVideoFrameCallback' in video) {
                        video.requestVideoFrameCallback(scanFrame);
                    } else {
                        requestAnimationFrame(scanFrame);
                    }
                };

                video.addEventListener('play', () => {
                    resultCard.className = "ready";
                    resultCard.innerText = "QR 코드를 비춰주세요";
                    scanFrame(); // 스캔 루프 시작
                });

            } catch (error) {
                resultCard.className = "error";
                resultCard.innerText = "카메라 권한을 허용해주세요.";
            }
        }

        window.onload = startScanner;
    </script>
</body>
</html>
