<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root {
            --mint: #10b981;
            --mint-dim: rgba(16,185,129,0.15);
            --fg: #f5f5f0;
            --bg: #0a0a0a;
            --card-bg: #111;
            --radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            font-family: 'DM Mono', monospace;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--fg);
        }

        /* ── 뷰파인더 ── */
        #viewer {
            position: relative;
            flex: 1 1 0;
            min-height: 0;
            background: #000;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 네 모서리 가이드 — 레이저 없음, 정적인 프레임만 */
        .frame {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .frame-box {
            position: relative;
            width: min(62vw, 260px);
            aspect-ratio: 1;
        }

        .corner {
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: var(--mint);
            border-style: solid;
            border-radius: 2px;
            opacity: 0.9;
        }
        .corner.tl { top: 0; left: 0;  border-width: 2.5px 0 0 2.5px; }
        .corner.tr { top: 0; right: 0; border-width: 2.5px 2.5px 0 0; }
        .corner.bl { bottom: 0; left: 0;  border-width: 0 0 2.5px 2.5px; }
        .corner.br { bottom: 0; right: 0; border-width: 0 2.5px 2.5px 0; }

        /* 스캔 성공 시 프레임 플래시 */
        .frame-box.flash {
            animation: flash 0.35s ease-out;
        }
        @keyframes flash {
            0%   { outline: 2px solid var(--mint); outline-offset: 4px; opacity: 1; }
            100% { outline: 2px solid transparent; outline-offset: 12px; opacity: 0; }
        }

        /* ── 하단 상태 카드 ── */
        #card {
            flex-shrink: 0;
            margin: 10px 12px 16px;
            border-radius: var(--radius);
            padding: 22px 24px 24px;
            background: var(--card-bg);
            transition: background 0.25s cubic-bezier(.4,0,.2,1);
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            overflow: hidden;
        }

        #card.ready   { background: var(--card-bg); border: 1px solid transparent; }
        #card.sending { background: #271a00; border: 1px solid rgba(251,191,36,0.3); }
        #card.success { background: #052e16; border: 1px solid rgba(16,185,129,0.4); }
        #card.error   { background: #2a0e0e; border: 1px solid rgba(248,113,113,0.25); }

        #label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.4;
            font-weight: 500;
        }

        #code {
            font-size: 1.55rem;
            font-weight: 500;
            line-height: 1.2;
            word-break: break-all;
            color: var(--fg);
            letter-spacing: -0.02em;
            transition: color 0.2s;
        }

        #card.sending #code { color: #fbbf24; }
        #card.success #code { color: #34d399; }
        #card.error   #code { color: #f87171; }

        /* 전송 중 점 애니메이션 */
        .dot { display: inline-block; animation: blink 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

        #dots { display: none; margin-left: 4px; color: #fbbf24; }
        #card.sending #dots { display: inline; }

        /* 하단 힌트 */
        #hint {
            font-size: 0.58rem;
            letter-spacing: 0.1em;
            opacity: 0.22;
            text-transform: uppercase;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div id="viewer">
    <video id="video" playsinline autoplay muted></video>
    <div class="frame">
        <div class="frame-box" id="frame-box">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
        </div>
    </div>
</div>

<div id="card" class="ready">
    <div id="label">ready to scan</div>
    <div id="code">대기 중<span id="dots"><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span></span></div>
    <div id="hint">frame the code · hold steady</div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrmz0rU5gl8IPZ9ZWd57NtyI7Q9mjEeFbHaJ8pX-waba83n5BJ0kGaWZCx7D330teZYw/exec";

const codeReader = new ZXing.BrowserMultiFormatReader();

const card     = document.getElementById('card');
const label    = document.getElementById('label');
const codeEl   = document.getElementById('code');
const hint     = document.getElementById('hint');
const frameBox = document.getElementById('frame-box');
const dotsEl   = document.getElementById('dots');

let isProcessing = false;
let lastScanned  = "";

/* 상태 렌더 */
function setState(state, labelText, codeText, hintText = "") {
    card.className = state;
    label.textContent = labelText;
    hint.textContent  = hintText;
    // textContent를 직접 쓰면 자식 노드(dots)가 제거되므로 firstChild 텍스트 노드만 교체
    if (codeEl.firstChild && codeEl.firstChild.nodeType === Node.TEXT_NODE) {
        codeEl.firstChild.textContent = codeText;
    } else {
        codeEl.insertBefore(document.createTextNode(codeText), codeEl.firstChild);
    }
}

/* 프레임 플래시 */
function flashFrame() {
    frameBox.classList.remove('flash');
    void frameBox.offsetWidth; // reflow
    frameBox.classList.add('flash');
}

async function startScanning() {
    try {
        const constraints = {
            video: {
                facingMode: "environment",
                width:     { ideal: 1920 },
                height:    { ideal: 1080 },
                advanced:  [{ focusMode: "continuous" }],
            }
        };

        codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
            if (result && !isProcessing) handleScan(result.text);
        });
    } catch (e) {
        setState("error", "camera error", "권한을 허용해주세요.");
    }
}

async function handleScan(text) {
    if (text === lastScanned) {
        setState("error", "duplicate", "이미 처리된 코드", "scan a different code");
        setTimeout(reset, 2000);
        return;
    }

    isProcessing = true;
    lastScanned  = text;
    flashFrame();
    setState("sending", "sending", text, "uploading to sheet");

    try {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?text=${encodeURIComponent(text)}`);
        if (res.ok) {
            setState("success", "success", text, "ready for next scan");
            if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
            setTimeout(() => { isProcessing = false; reset(); }, 1400);
        } else {
            throw new Error();
        }
    } catch {
        setState("error", "failed", "전송 실패", "check network · try again");
        isProcessing = false;
        lastScanned  = "";
    }
}

function reset() {
    if (isProcessing) return;
    setState("ready", "ready to scan", "대기 중", "frame the code · hold steady");
}

startScanning();
</script>
</body>
</html>
