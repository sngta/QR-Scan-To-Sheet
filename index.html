<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR+SC</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --brand-color: #10b981; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        #video-container { position: relative; width: 100%; height: 65vh; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; display: block; }
        #proc-canvas { display: none; }

        .scanner-laser {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.3); border-radius: 20px;
        }
        .scanner-laser::after {
            content: ""; position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background: var(--brand-color); box-shadow: 0 0 15px var(--brand-color);
            animation: laser 2s infinite;
        }
        @keyframes laser { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        #result-card {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; padding: 20px; text-align: center; transition: background 0.25s;
        }
        .ready   { background: #1a1a1a; }
        .sending { background: var(--brand-color); animation: pulse 1s infinite; }
        .success { background: #059669; }
        .error   { background: #dc2626; }

        .code-text   { font-size: 1.8rem; font-weight: 900; margin-top: 10px; letter-spacing: -0.5px; word-break: break-all; }
        .status-text { font-size: 1rem; opacity: 0.8; text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="proc-canvas"></canvas>
        <div class="scanner-laser"></div>
    </div>

    <div id="result-card" class="ready">
        <div class="status-text" id="status">SCANNER READY</div>
        <div class="code-text" id="code-display">대기 중…</div>
    </div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrmz0rU5gl8IPZ9ZWd57NtyI7Q9mjEeFbHaJ8pX-waba83n5BJ0kGaWZCx7D330teZYw/exec";

const videoEl     = document.getElementById('video');
const procCanvas  = document.getElementById('proc-canvas');
const ctx         = procCanvas.getContext('2d', { willReadFrequently: true });
const resultCard  = document.getElementById('result-card');
const statusText  = document.getElementById('status');
const codeDisplay = document.getElementById('code-display');

let isProcessing = false;
let lastScanned  = "";

/* ─────────────────────────────────────────
   ZXing 힌트 최적화
   ① TRY_HARDER   : 고밀도/손상 코드에서 추가 디코딩 패스 수행 (가장 중요)
   ② ALSO_INVERTED: 정방향 + 반전 패턴 둘 다 시도
   ③ PURE_BARCODE  : false → 배경과 섞인 실물 라벨 대응
   ④ CHARACTER_SET : UTF-8 강제 → 한국어 포함 텍스트 깨짐 방지
───────────────────────────────────────── */
const hints = new Map([
    [ZXing.DecodeHintType.TRY_HARDER,    true],
    [ZXing.DecodeHintType.ALSO_INVERTED, true],
    [ZXing.DecodeHintType.PURE_BARCODE,  false],
    [ZXing.DecodeHintType.CHARACTER_SET, "UTF-8"],
    [ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.DATA_MATRIX,
        ZXing.BarcodeFormat.PDF_417,
        ZXing.BarcodeFormat.AZTEC,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
    ]],
]);

const codeReader = new ZXing.BrowserMultiFormatReader(hints);

/* ─────────────────────────────────────────
   캔버스 프리프로세싱
   – ZXing에 원본 대신 이진화 이미지를 공급
   – 인쇄 품질이 낮거나 조명이 불균등한 라벨에서 인식률 향상
   – 임계값 140: 모듈 뭉개짐과 배경 노이즈 사이의 실측 최적값
───────────────────────────────────────── */
function getProcessedCanvas() {
    const w = videoEl.videoWidth;
    const h = videoEl.videoHeight;
    if (!w || !h) return null;

    procCanvas.width  = w;
    procCanvas.height = h;
    ctx.drawImage(videoEl, 0, 0, w, h);

    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        const bin  = gray < 140 ? 0 : 255;
        d[i] = d[i + 1] = d[i + 2] = bin;
    }
    ctx.putImageData(imgData, 0, 0);
    return procCanvas;
}

/* ─────────────────────────────────────────
   스캔 루프
   – RAF 기반으로 매 프레임 ZXing 디코딩 시도
   – decodeFromCanvas: 전처리된 이진화 이미지를 직접 입력
   – isProcessing 플래그로 전송 중 불필요한 디코딩 차단
───────────────────────────────────────── */
function scanLoop() {
    if (!isProcessing) {
        const canvas = getProcessedCanvas();
        if (canvas) {
            try {
                const result = codeReader.decodeFromCanvas(canvas);
                if (result) handleScan(result.getText());
            } catch (e) { /* 디코딩 미성공 – 정상 */ }
        }
    }
    requestAnimationFrame(scanLoop);
}

/* ─────────────────────────────────────────
   카메라 초기화
   – 4K 요청: 고밀도 QR 1픽셀당 센서 픽셀 수 극대화
   – focusMode continuous: 연속 자동초점
   – frameRate 60: RAF 루프 활용도 극대화
───────────────────────────────────────── */
async function startScanning() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment",
                width:     { ideal: 3840 },
                height:    { ideal: 2160 },
                frameRate: { ideal: 60 },
                advanced:  [{ focusMode: "continuous" }],
            }
        });
        videoEl.srcObject = stream;
        videoEl.addEventListener('loadedmetadata', () => {
            videoEl.play();
            scanLoop();
        });
    } catch (err) {
        updateUI("error", "카메라 오류", "권한을 허용해주세요.");
    }
}

/* ─────────────────────────────────────────
   전송 및 UI
───────────────────────────────────────── */
async function handleScan(text) {
    if (text === lastScanned) {
        if (resultCard.className !== "error") {
            updateUI("error", "중복 스캔 경고", "방금 처리된 코드입니다.");
            setTimeout(resetUI, 2000);
        }
        return;
    }

    isProcessing = true;
    lastScanned  = text;
    updateUI("sending", "전송 중…", text);

    try {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?text=${encodeURIComponent(text)}`);
        if (res.ok) {
            updateUI("success", "전송 완료", text);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => { isProcessing = false; resetUI(); }, 1200);
        } else {
            throw new Error("HTTP " + res.status);
        }
    } catch (err) {
        updateUI("error", "전송 실패", "네트워크를 확인하세요.");
        isProcessing = false;
        lastScanned  = "";
    }
}

function updateUI(state, status, code) {
    resultCard.className    = state;
    statusText.textContent  = status;
    codeDisplay.textContent = code;
}

function resetUI() {
    if (isProcessing) return;
    resultCard.className    = "ready";
    statusText.textContent  = "SCANNER READY";
    codeDisplay.textContent = "다음 스캔 대기 중…";
}

startScanning();
</script>
</body>
</html>
