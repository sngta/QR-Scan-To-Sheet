<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR+SC</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --brand-color: #10b981; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #video-container { position: relative; width: 100%; height: 65vh; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        .scanner-laser {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.3); border-radius: 20px;
        }
        .scanner-laser::after {
            content: ""; position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background: var(--brand-color); box-shadow: 0 0 15px var(--brand-color);
            animation: laser 2s infinite;
        }
        @keyframes laser { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        #result-card {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; padding: 20px; text-align: center; transition: all 0.3s;
        }
        .ready   { background: #1a1a1a; }
        .sending { background: var(--brand-color); animation: pulse 1s infinite; }
        .success { background: #059669; }
        .error   { background: #dc2626; }

        .code-text   { font-size: 1.8rem; font-weight: 900; margin-top: 10px; letter-spacing: -0.5px; }
        .status-text { font-size: 1rem; opacity: 0.8; text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" playsinline autoplay muted></video>
        <div class="scanner-laser"></div>
    </div>

    <div id="result-card" class="ready">
        <div class="status-text" id="status">SCANNER READY</div>
        <div class="code-text" id="code-display">대기 중...</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrmz0rU5gl8IPZ9ZWd57NtyI7Q9mjEeFbHaJ8pX-waba83n5BJ0kGaWZCx7D330teZYw/exec";

        /* ─────────────────────────────────────────
           ZXing 힌트
           ① TRY_HARDER   : 고밀도/손상 코드 추가 패스 (ZXing HybridBinarizer 최대 활용)
           ② ALSO_INVERTED: 정방향 + 반전 패턴 둘 다 시도
           ③ PURE_BARCODE  : false → 실물 라벨 배경 대응
           ④ CHARACTER_SET : UTF-8 강제
           ⑤ 이진화는 ZXing 내부 HybridBinarizer에 완전히 위임 (프리프로세싱 없음)
        ───────────────────────────────────────── */
        const hints = new Map([
            [ZXing.DecodeHintType.TRY_HARDER,    true],
            [ZXing.DecodeHintType.ALSO_INVERTED, true],
            [ZXing.DecodeHintType.PURE_BARCODE,  false],
            [ZXing.DecodeHintType.CHARACTER_SET, "UTF-8"],
            [ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                ZXing.BarcodeFormat.QR_CODE,
                ZXing.BarcodeFormat.DATA_MATRIX,
                ZXing.BarcodeFormat.PDF_417,
                ZXing.BarcodeFormat.AZTEC,
                ZXing.BarcodeFormat.CODE_128,
                ZXing.BarcodeFormat.CODE_39,
            ]],
        ]);

        const codeReader  = new ZXing.BrowserMultiFormatReader(hints);
        const resultCard  = document.getElementById('result-card');
        const statusText  = document.getElementById('status');
        const codeDisplay = document.getElementById('code-display');

        let isProcessing = false;
        let lastScanned  = "";

        async function startScanning() {
            try {
                const constraints = {
                    video: {
                        facingMode: "environment",
                        width:     { ideal: 3840 },
                        height:    { ideal: 2160 },
                        frameRate: { ideal: 60 },
                        advanced:  [{ focusMode: "continuous" }],
                    }
                };

                codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
                    if (result && !isProcessing) {
                        handleScan(result.text);
                    }
                });
            } catch (err) {
                updateUI("error", "카메라 오류", "권한을 허용해주세요.");
            }
        }

        async function handleScan(text) {
            if (text === lastScanned) {
                if (resultCard.className !== "error") {
                    updateUI("error", "중복 스캔 경고", "방금 처리된 코드입니다.");
                    setTimeout(resetUI, 2000);
                }
                return;
            }

            isProcessing = true;
            lastScanned  = text;
            updateUI("sending", "전송 중...", text);

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?text=${encodeURIComponent(text)}`);
                if (response.ok) {
                    updateUI("success", "전송 완료", text);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    setTimeout(() => { isProcessing = false; resetUI(); }, 1200);
                }
            } catch (err) {
                updateUI("error", "전송 실패", "네트워크를 확인하세요.");
                isProcessing = false;
                lastScanned  = "";
            }
        }

        function updateUI(state, status, code) {
            resultCard.className    = state;
            statusText.innerText    = status;
            codeDisplay.innerText   = code;
        }

        function resetUI() {
            if (isProcessing) return;
            resultCard.className    = "ready";
            statusText.innerText    = "SCANNER READY";
            codeDisplay.innerText   = "다음 스캔 대기 중...";
        }

        startScanning();
    </script>
</body>
</html>
